<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Reset Complete – RidePass</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --green: #3aaf5c; --green-dark: #2a8f46; --green-light: #e8f8ee; --dark: #1a2332; --gray: #6b7280; --white: #fff; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--green-light); }
  .card { background: white; border-radius: 20px; padding: 3rem 2.5rem; max-width: 440px; width: 90%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .icon { font-size: 56px; margin-bottom: 1.2rem; }
  .title { font-size: 1.5rem; font-weight: 800; color: var(--dark); margin-bottom: .6rem; }
  .sub { font-size: 14px; color: var(--gray); line-height: 1.6; margin-bottom: 2rem; }
  .btn { display: inline-block; padding: 13px 32px; background: var(--green); color: white; border-radius: 10px; font-size: 15px; font-weight: 700; text-decoration: none; transition: background .2s; }
  .btn:hover { background: var(--green-dark); }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎉</div>
  <div class="title">Password Reset!</div>
  <div class="sub">
    Your password has been successfully reset.<br>
    You can now log in with your new password.
  </div>
  <a href="/login/" class="btn">🔐 Log In Now</a>
</div>
</body>
</html>
