<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password – RidePass</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #3aaf5c; --green-dark: #2a8f46; --green-light: #e8f8ee;
    --blue: #1a6fb5; --dark: #1a2332; --gray: #6b7280;
    --light: #f9fafb; --white: #fff; --border: #e5e7eb; --red: #ef4444;
  }
  body { font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; }
  .left-panel {
    flex: 1; background: linear-gradient(160deg, #0d4f35 0%, #1a6fb5 60%, #0d3d6b 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 3rem; position: relative; overflow: hidden; min-height: 100vh;
  }
  .left-panel::before {
    content: ''; position: absolute; top: -200px; left: -200px;
    width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(58,175,92,0.25) 0%, transparent 60%);
  }
  .left-content { position: relative; z-index: 1; text-align: center; color: white; max-width: 380px; }
  .left-logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 3rem; }
  .left-logo-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 800; color: white;
  }
  .left-logo-text { font-size: 26px; font-weight: 800; }
  .left-logo-text span { color: #6ee89e; }
  .left-tagline { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; line-height: 1.3; }
  .left-sub { font-size: 14px; opacity: .75; line-height: 1.6; }
  .right-panel {
    width: 480px; background: var(--white); display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 3rem 2.5rem; min-height: 100vh;
  }
  .form-box { width: 100%; max-width: 380px; }
  .form-title { font-size: 1.6rem; font-weight: 800; color: var(--dark); margin-bottom: .4rem; }
  .form-sub { font-size: 13px; color: var(--gray); margin-bottom: 2rem; line-height: 1.5; }
  .form-group { margin-bottom: 1.2rem; }
  .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--dark); margin-bottom: .4rem; }
  .form-input {
    width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 14px; color: var(--dark); outline: none; transition: border .2s;
  }
  .form-input:focus { border-color: var(--green); }
  .btn-green {
    width: 100%; padding: 13px; background: var(--green); color: white;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: background .2s; margin-top: .5rem;
  }
  .btn-green:hover { background: var(--green-dark); }
  .back-link { text-align: center; margin-top: 1.2rem; font-size: 13px; color: var(--gray); }
  .back-link a { color: var(--green); font-weight: 600; text-decoration: none; }
  .back-link a:hover { text-decoration: underline; }
  .icon-box {
    width: 64px; height: 64px; border-radius: 50%; background: var(--green-light);
    display: flex; align-items: center; justify-content: center; font-size: 28px;
    margin-bottom: 1.5rem;
  }
  @media (max-width: 768px) {
    .left-panel { display: none; }
    .right-panel { width: 100%; }
  }
</style>
</head>
<body>
<div class="left-panel">
  <div class="left-content">
    <div class="left-logo">
      <div class="left-logo-icon">R</div>
      <div class="left-logo-text">Ride<span>Pass</span></div>
    </div>
    <div class="left-tagline">Reset your password</div>
    <div class="left-sub">Enter your email and we'll send you a link to get back into your account.</div>
  </div>
</div>

<div class="right-panel">
  <div class="form-box">
    <div class="icon-box">🔑</div>
    <div class="form-title">Forgot Password?</div>
    <div class="form-sub">No worries! Enter your email address below and we'll send you a password reset link.</div>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="id_email">Email Address</label>
        <input type="email" name="email" id="id_email" class="form-input" placeholder="Enter your email" required autofocus>
      </div>
      <button type="submit" class="btn-green">📧 Send Reset Link</button>
    </form>

    <div class="back-link">
      Remember your password? <a href="/login/">Back to Login</a>
    </div>
  </div>
</div>
</body>
</html>
