<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check Your Email – RidePass</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --green: #3aaf5c; --green-dark: #2a8f46; --green-light: #e8f8ee; --blue: #1a6fb5; --dark: #1a2332; --gray: #6b7280; --white: #fff; --border: #e5e7eb; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--green-light); }
  .card { background: white; border-radius: 20px; padding: 3rem 2.5rem; max-width: 440px; width: 90%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .icon { font-size: 56px; margin-bottom: 1.2rem; }
  .title { font-size: 1.5rem; font-weight: 800; color: var(--dark); margin-bottom: .6rem; }
  .sub { font-size: 14px; color: var(--gray); line-height: 1.6; margin-bottom: 2rem; }
  .btn { display: inline-block; padding: 12px 28px; background: var(--green); color: white; border-radius: 10px; font-size: 14px; font-weight: 700; text-decoration: none; transition: background .2s; }
  .btn:hover { background: var(--green-dark); }
  .note { margin-top: 1.2rem; font-size: 12px; color: var(--gray); }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📬</div>
  <div class="title">Check Your Email!</div>
  <div class="sub">
    We've sent a password reset link to your email address.<br>
    Click the link in the email to reset your password.<br><br>
    <strong>Didn't receive it?</strong> Check your spam folder or try again.
  </div>
  <a href="/password-reset/" class="btn">Try Again</a>
  <div class="note">The link will expire in 24 hours.</div>
</div>
</body>
</html>
